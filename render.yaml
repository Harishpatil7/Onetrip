services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: onetrip-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ─── Frontend (React + Vite) ──────────────────────────────────────────
  - type: web
    name: onetrip-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
